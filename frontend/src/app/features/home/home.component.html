<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" [class.collapsed]="!menuOpen">

        <div class="logo">
            <i class="fas fa-shield-alt"></i>
            <span *ngIf="menuOpen">SegurEntry</span>
        </div>

        <nav>
            <button (click)="logout()" class="logout">
                <i class="fas fa-sign-out-alt"></i>
                <span *ngIf="menuOpen">Cerrar sesión</span>
            </button>
        </nav>
    </aside>

    <!-- MAIN -->
    <main class="main">

        <!-- TOP BAR -->
        <header>
            <button class="menu-btn" (click)="toggleMenu()">
                <i class="fas fa-bars"></i>
            </button>

            <h2>Panel de Control</h2>
        </header>

        <!-- FORM -->
        <section class="card form-card">

            <h3>{{ editMode ? 'Editar acceso' : 'Crear acceso' }}</h3>

            <input [(ngModel)]="form.name" placeholder="Nombre" />

            <input [(ngModel)]="form.email" placeholder="Correo electrónico" />

            <input [(ngModel)]="form.document" placeholder="Documento" />

            <input [(ngModel)]="form.role" placeholder="Rol" />

            <label>
                <input type="checkbox" [(ngModel)]="form.tempAccess" />
                Acceso temporal
            </label>

            <input *ngIf="form.tempAccess" type="date" [(ngModel)]="form.expirationDate" />

            <button (click)="saveAccess()">
                {{ editMode ? 'Actualizar' : 'Crear' }}
            </button>

            <button *ngIf="editMode" (click)="resetForm()" class="cancel">
                Cancelar
            </button>
        </section>

        <!-- LIST -->
        <section class="card list-card">

            <h3>Usuarios / Accesos</h3>

            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Rol</th>
                        <th>Temporal</th>
                        <th>Expira</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr *ngFor="let a of accesses">
                        <td>{{ a.name }}</td>
                        <td>{{ a.role }}</td>
                        <td>{{ a.tempAccess ? 'Sí' : 'No' }}</td>
                        <td>{{ a.expirationDate || '-' }}</td>

                        <td>
                            <button class="edit" (click)="editAccess(a)" title="Editar">
                                <i class="fas fa-edit"></i>
                            </button>

                            <button class="delete" (click)="deleteAccess(a.id)" title="Eliminar">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>

        </section>

    </main>
</div>
