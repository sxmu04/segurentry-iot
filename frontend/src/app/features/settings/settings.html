<div class="settings-container">

    <!-- ===================== HEADER ===================== -->

    <div class="page-header">

        <div>

            <h2>Configuración</h2>

            <p>

                Personaliza las preferencias de tu cuenta y del sistema.

            </p>

        </div>

    </div>

    <!-- ===================== CONFIGURACIÓN ===================== -->

    <div class="settings-card">

        <!-- PREFERENCIAS -->

        <div class="settings-section">

            <h3>

                <i class="fas fa-user-cog"></i>

                Preferencias

            </h3>

            <label class="switch-item">

                <span>

                    Recibir notificaciones del sistema

                </span>

                <input type="checkbox" checked>

            </label>

            <label class="switch-item">

                <span>

                    Recibir notificaciones por correo

                </span>

                <input type="checkbox" checked>

            </label>

        </div>

        <!-- APARIENCIA -->

        <div class="settings-section">

            <h3>

                <i class="fas fa-palette"></i>

                Apariencia

            </h3>

            <div class="field">

                <label>

                    Tema

                </label>

                <select>

                    <option selected>

                        Oscuro

                    </option>

                    <option>

                        Claro

                    </option>

                </select>

            </div>

            <div class="field">

                <label>

                    Idioma

                </label>

                <select>

                    <option selected>

                        Español

                    </option>

                    <option>

                        Inglés

                    </option>

                </select>

            </div>

        </div>

        <!-- SEGURIDAD -->

        <div class="settings-section">

            <h3>

                <i class="fas fa-shield-alt"></i>

                Seguridad

            </h3>

            <label class="switch-item">

                <span>

                    Solicitar autenticación al iniciar sesión

                </span>

                <input type="checkbox" checked>

            </label>

            <label class="switch-item">

                <span>

                    Recordar este dispositivo

                </span>

                <input type="checkbox">

            </label>

        </div>

        <!-- SISTEMA -->

        <div class="settings-section">

            <h3>

                <i class="fas fa-sliders-h"></i>

                Sistema

            </h3>

            <div class="field">

                <label>

                    Zona Horaria

                </label>

                <select>

                    <option selected>

                        GMT-5 (Colombia)

                    </option>

                </select>

            </div>

            <div class="field">

                <label>

                    Formato de Fecha

                </label>

                <select>

                    <option selected>

                        DD/MM/AAAA

                    </option>

                    <option>

                        MM/DD/AAAA

                    </option>

                </select>

            </div>

        </div>
        <!-- ===================== BOTONES ===================== -->

        <div class="settings-actions">

            <button class="secondary-btn">

                <i class="fas fa-undo"></i>

                Restaurar configuración

            </button>

            <button class="primary-btn">

                <i class="fas fa-save"></i>

                Guardar cambios

            </button>

        </div>

    </div>

</div>
